apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-explorer
  namespace: ml-explorer
  labels:
    app: ml-lifecycle-explorer
    version: v1.0.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ml-lifecycle-explorer
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ml-lifecycle-explorer
        version: v1.0.0
    spec:
      containers:
        - name: ml-explorer
          image: ghcr.io/your-org/ml-lifecycle-explorer:latest
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
