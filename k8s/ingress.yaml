apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ml-explorer-ingress
  namespace: ml-explorer
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - ml-explorer.yourdomain.com
      secretName: ml-explorer-tls
  rules:
    - host: ml-explorer.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ml-explorer-service
                port:
                  number: 80
